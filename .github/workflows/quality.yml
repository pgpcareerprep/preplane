name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - run: npm run check:bundle
      - run: npm run audit:ci

  public-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e:public

  production-auth-smoke:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Copilot rejects anonymous requests
        run: test "$(curl -sS -o /tmp/body -w '%{http_code}' '${{ secrets.SUPABASE_URL }}/functions/v1/copilot-ai')" = "401"
      - name: Voice rejects anonymous requests
        run: test "$(curl -sS -o /tmp/body -w '%{http_code}' '${{ secrets.SUPABASE_URL }}/functions/v1/voice-copilot')" = "401"
