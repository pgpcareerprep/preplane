name: Quality

on:
  push:
    branches: [main]
  pull_request:

env:
  VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://sgqwnjajvgjcwqergnsr.supabase.co' }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'ci-public-placeholder' }}
  SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://sgqwnjajvgjcwqergnsr.supabase.co' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - run: npm run check:bundle
      - run: npm run audit:ci

  services-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Deno does not type-check on `run`/`cache`, so a broken orchestrator
      # only surfaces at runtime (or fails the Render Docker build silently).
      - name: Type-check Deno orchestrator
        run: deno check main.ts
        working-directory: services/orchestrator
      - name: Syntax-check Python path services
        run: python3 -m compileall -q services/reasoning services/workflow services/semantic-classifier services/deploy
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services
      - name: Compile-check Rust services
        run: cargo check --workspace --locked
        working-directory: services

  public-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e:public

  production-auth-smoke:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Privileged jobs reject anonymous requests
        run: |
          test "$(curl -sS -o /tmp/body -w '%{http_code}' "$SUPABASE_URL/functions/v1/progress-reminder-cron")" = "401"
          test "$(curl -sS -o /tmp/body -w '%{http_code}' "$SUPABASE_URL/functions/v1/sheets-retry-sweeper")" = "401"
          test "$(curl -sS -o /tmp/body -w '%{http_code}' "$SUPABASE_URL/functions/v1/sync-ingest")" = "401"

  gateway-smoke:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      COPILOT_GATEWAY_URL: https://preplane-copilot.onrender.com
    steps:
      - name: Gateway health
        run: curl -sf "$COPILOT_GATEWAY_URL/health"
      - name: Gateway copilot rejects anonymous requests
        run: |
          code="$(curl -sS -o /tmp/body -w '%{http_code}' \
            -X POST "$COPILOT_GATEWAY_URL/copilot" \
            -H 'Content-Type: application/json' \
            -d '{"messages":[{"role":"user","content":"hi"}]}')"
          test "$code" = "401"
      - name: Gateway voice rejects anonymous requests
        run: |
          code="$(curl -sS -o /tmp/body -w '%{http_code}' \
            -X POST "$COPILOT_GATEWAY_URL/voice" \
            -H 'Content-Type: application/json' \
            -d '{"messages":[]}')"
          test "$code" = "401"
