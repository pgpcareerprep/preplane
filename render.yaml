# Render Blueprint — PrepLane Copilot (gateway + intent-router in one container).
# Connect this repo in Render Dashboard → New → Blueprint, then provide secret env values.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: preplane-copilot
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./services/Dockerfile.copilot
    dockerContext: ./services
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - services/**
        - render.yaml
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: INTENT_ROUTER_PORT
        value: "8081"
      - key: COMMAND_PLANE_PORT
        value: "8082"
      - key: LMP_ENGINE_PORT
        value: "8090"
      - key: RUST_LOG
        value: preplane_gateway=info,preplane_intent_router=info,preplane_command_plane=info,preplane_lmp=info
